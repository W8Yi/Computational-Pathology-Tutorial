<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Advanced methods roadmap">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2f8ff"/>
      <stop offset="100%" stop-color="#eef7f0"/>
    </linearGradient>
    <linearGradient id="box1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cfe8ff"/>
      <stop offset="100%" stop-color="#a8d3ff"/>
    </linearGradient>
    <linearGradient id="box2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe8d5"/>
      <stop offset="100%" stop-color="#ffcda6"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f4df"/>
      <stop offset="100%" stop-color="#b9eac4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <text x="60" y="70" font-size="44" font-family="Arial, sans-serif" font-weight="700" fill="#0f2438">Advanced Methods Roadmap</text>
  <text x="60" y="110" font-size="24" font-family="Arial, sans-serif" fill="#23415a">From baseline MIL to foundation encoders and diffusion-based tile generation</text>

  <rect x="60" y="160" width="330" height="230" rx="20" fill="url(#box1)" stroke="#2f6ea6" stroke-width="2"/>
  <text x="86" y="205" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#123e64">SSL Encoder</text>
  <text x="86" y="245" font-size="23" font-family="Arial, sans-serif" fill="#123e64">UNI and related models</text>
  <text x="86" y="280" font-size="20" font-family="Arial, sans-serif" fill="#123e64">Pretrained embeddings</text>
  <text x="86" y="310" font-size="20" font-family="Arial, sans-serif" fill="#123e64">for robust patch features</text>

  <rect x="435" y="160" width="330" height="230" rx="20" fill="url(#box2)" stroke="#b26a32" stroke-width="2"/>
  <text x="461" y="205" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#5f3415">Diffusion Models</text>
  <text x="461" y="245" font-size="23" font-family="Arial, sans-serif" fill="#5f3415">PixCell-like generators</text>
  <text x="461" y="280" font-size="20" font-family="Arial, sans-serif" fill="#5f3415">Synthetic tile creation</text>
  <text x="461" y="310" font-size="20" font-family="Arial, sans-serif" fill="#5f3415">for augmentation studies</text>

  <rect x="810" y="160" width="330" height="230" rx="20" fill="url(#box3)" stroke="#2f7d49" stroke-width="2"/>
  <text x="836" y="205" font-size="28" font-family="Arial, sans-serif" font-weight="700" fill="#1b5a32">Evaluation</text>
  <text x="836" y="245" font-size="23" font-family="Arial, sans-serif" fill="#1b5a32">Real vs synthetic</text>
  <text x="836" y="280" font-size="20" font-family="Arial, sans-serif" fill="#1b5a32">Generalization, bias,</text>
  <text x="836" y="310" font-size="20" font-family="Arial, sans-serif" fill="#1b5a32">and interpretability checks</text>

  <path d="M390 275 L430 275" stroke="#375c7e" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M765 275 L805 275" stroke="#5f4e29" stroke-width="5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#4f5f6f"/>
    </marker>
  </defs>
</svg>
